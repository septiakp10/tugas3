<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas3-162023042</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="mainBody">
    <div class="card" id="mainCard">
        <div class="card-header">
            <h1># Preferensi Warna</h1>
        </div>
        
        <div class="card-body" id="cardBody">
            <div class="warna-title" id="warnaTitle">Warna</div>
            <div id="warnaListContainer" class="warna-list"></div>
            <button class="btn-simpan" id="simpanBtn">Simpan</button>
        </div>
    </div>
    <div class="modal" id="colorModal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="modal-btn btn-cancel" id="cancelBtn">Cancel</button>
                <h2>Choose a color</h2>
                <button class="modal-btn btn-select" id="selectBtn">Select</button>
            </div>
            
            <div class="color-grid" id="colorGrid"></div>
            
            <div class="custom-section">Custom</div>
            
            <div class="color-input-wrapper">
                <input type="color" id="colorPicker" value="#ffffff">
            </div>
        </div>
    </div>

    <script>
        let bgColor = '#ffffff';
        let textColor = '#000000';
        let isSaved = false;
        let activeType = 'bg';
        
        const DOM = {
            body: document.getElementById('mainBody'),
            container: document.getElementById('warnaListContainer'),
            modal: document.getElementById('colorModal'),
            colorGrid: document.getElementById('colorGrid'),
            colorPicker: document.getElementById('colorPicker'),
            simpanBtn: document.getElementById('simpanBtn'),
            cancelBtn: document.getElementById('cancelBtn'),
            selectBtn: document.getElementById('selectBtn'),
            warnaTitle: document.getElementById('warnaTitle')
        };
        
        const colors = [
            '#ff4444', '#ffaa44', '#ffff44', '#88ff44', '#44ccff', 
            '#cc88ff', '#ffccaa', '#999999', '#ffffff',
            '#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', 
            '#6600ff', '#ff8844', '#888888', '#ffffff',
            '#cc0000', '#cc6600', '#cccc00', '#00cc00', '#0066cc', 
            '#6600cc', '#cc6644', '#666666', '#ffffff',
            '#000000', '#333333', '#666666', '#999999', '#cccccc', 
            '#ffffff', '#ffffff', '#ffffff', '#ffffff'
        ];

        function applyColors() {
            DOM.body.style.backgroundColor = bgColor;
            document.documentElement.style.setProperty('--text-color', textColor);
            document.querySelectorAll('.warna-number, .warna-text').forEach(el => {
                el.style.color = textColor;
            });
            if (DOM.warnaTitle) DOM.warnaTitle.style.color = textColor;
        }

        function renderColors() {
            const warnaHTML = (type, number, label, color, id) => `
                <div class="warna-item ${isSaved ? 'with-checkbox' : ''}">
                    ${isSaved ? `<input type="checkbox" class="warna-checkbox" id="${id}Checkbox" checked>` : ''}
                    <span class="warna-number">${number}.</span>
                    <span class="warna-text">${label}</span>
                    <div class="color-square" id="${id}ColorSquare" style="background-color: ${color}; border-color: white;"></div>
                </div>
            `;

            DOM.container.innerHTML = warnaHTML('bg', 1, 'Warna latarbelakang', bgColor, 'bg') + 
                                      warnaHTML('text', 2, 'Warna teks', textColor, 'text');

            document.getElementById('bgColorSquare').onclick = () => { activeType = 'bg'; openModal(); };
            document.getElementById('textColorSquare').onclick = () => { activeType = 'text'; openModal(); };

            if (isSaved) {
                document.getElementById('bgCheckbox').onchange = (e) => {
                    DOM.body.style.backgroundColor = e.target.checked ? bgColor : '#ffffff';
                };
                document.getElementById('textCheckbox').onchange = (e) => {
                    const color = e.target.checked ? textColor : '#000000';
                    document.querySelectorAll('.warna-number, .warna-text').forEach(el => {
                        el.style.color = color;
                    });
                    if (DOM.warnaTitle) DOM.warnaTitle.style.color = color;
                };
            }
        }

        function openModal() {
            DOM.colorGrid.innerHTML = colors.map(color => 
                `<div class="color-option" data-color="${color}" style="background-color: ${color}"></div>`
            ).join('');
            
            const currentColor = activeType === 'bg' ? bgColor : textColor;
            DOM.colorPicker.value = currentColor;
            
            document.querySelectorAll('.color-option').forEach(el => {
                const color = el.getAttribute('data-color');
                if (color === currentColor) el.classList.add('selected');
                
                el.onclick = () => {
                    DOM.colorPicker.value = color;
                    document.querySelectorAll('.color-option.selected').forEach(s => s.classList.remove('selected'));
                    el.classList.add('selected');
                };
            });
            
            DOM.colorPicker.onchange = () => {
                document.querySelectorAll('.color-option.selected').forEach(s => s.classList.remove('selected'));
            };
            
            DOM.modal.classList.add('show');
        }

        function closeModal() {
            DOM.modal.classList.remove('show');
        }

        function updateSquarePreview() {
            const bgSquare = document.getElementById('bgColorSquare');
            const textSquare = document.getElementById('textColorSquare');
            if (bgSquare) bgSquare.style.backgroundColor = bgColor;
            if (textSquare) textSquare.style.backgroundColor = textColor;
        }

        DOM.cancelBtn.onclick = closeModal;
        DOM.selectBtn.onclick = () => {
            activeType === 'bg' ? bgColor = DOM.colorPicker.value : textColor = DOM.colorPicker.value;
            updateSquarePreview();
            closeModal();
        };
        DOM.simpanBtn.onclick = () => {
            isSaved = true;
            renderColors();
            applyColors();
            DOM.simpanBtn.style.backgroundColor = '#27ae60';
            DOM.simpanBtn.textContent = '✓ Tersimpan';
            setTimeout(() => {
                DOM.simpanBtn.style.backgroundColor = '#6b7280';
                DOM.simpanBtn.textContent = 'Simpan';
            }, 2000);
        };
        DOM.modal.onclick = (e) => e.target === DOM.modal && closeModal();
        document.onkeydown = (e) => e.key === 'Escape' && DOM.modal.classList.contains('show') && closeModal();

        renderColors();
    </script>
</body>
</html>
